{% extends "base.html" %}
{% block title %}Смена пароля{% endblock %}
{% block content %}
<div class="login-wrap">
    <form class="login-card" method="post" action="{{ url_for('change_password') }}">
        <h1>Смена пароля</h1>
        <p class="muted small">Пользователь: {{ session.user }}</p>

        {% if error %}<div class="login-error">{{ error }}</div>{% endif %}
        {% if success %}<div class="login-success">{{ success }}</div>{% endif %}

        {% if not success %}
        <label>Текущий пароль
            <input type="password" name="current_password" autocomplete="current-password" autofocus required>
        </label>
        <label>Новый пароль
            <input type="password" name="new_password" autocomplete="new-password" required>
        </label>
        <label>Повторите новый пароль
            <input type="password" name="new_password2" autocomplete="new-password" required>
        </label>
        <button type="submit" class="btn btn-primary login-btn">Сменить пароль</button>
        {% endif %}

        <div class="login-back">
            <a href="{{ url_for('index') }}">← К списку карт</a>
        </div>
    </form>
</div>
{% endblock %}
